services:
  api:
    build:
      context: .
      target: runtime
    image: ai-support-copilot:latest
    container_name: copilot_api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # Persist FAISS index and uploaded docs across container restarts
      - ./vector_store:/app/vector_store
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
