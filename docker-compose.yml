version: '3.8'

services:
  # === DocuMind Backend ===
  documind:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=llama3
      - LLM_TEMPERATURE=0.15
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=64
      - TOP_K_RETRIEVAL=5
      - BM25_WEIGHT=0.35
      - VECTOR_WEIGHT=0.65
      - RERANK_ENABLED=true
      - MEMORY_WINDOW_SIZE=10
      - DATA_DIR=data
    volumes:
      - documind_data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  # === Ollama LLM Engine ===
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Pull the model on first run:
    # docker exec -it documind-ai-copilot-ollama-1 ollama pull llama3

volumes:
  documind_data:
  ollama_models:
