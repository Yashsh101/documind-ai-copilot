version: '3.8'

services:
  # === DocuMind Backend ===
  documind:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-proj-add-your-key-here}
      - LLM_TEMPERATURE=0.15
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=64
      - TOP_K_RETRIEVAL=5
      - BM25_WEIGHT=0.35
      - VECTOR_WEIGHT=0.65
      - MIN_RELEVANCE_SCORE=0.25
      - RERANK_ENABLED=true
      - MEMORY_WINDOW_SIZE=10
      - DATA_DIR=data
      - LOG_LEVEL=INFO
    volumes:
      - documind_data:/app/data
    restart: unless-stopped

volumes:
  documind_data:
