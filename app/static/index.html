<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocuMind AI Copilot</title>
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">DocuMind</div>

            <button id="upload-btn" class="primary-btn">Upload Files</button>
            <input type="file" id="file-input" multiple hidden />

            <div class="sidebar-section">
                <div class="section-title">Indexed Documents</div>
                <div id="documents-list" class="documents-list">
                    <div class="doc-empty">No documents uploaded yet.</div>
                </div>
            </div>

            <button id="clear-chat" class="secondary-btn">Clear Chat</button>
        </aside>

        <main class="main-panel">
            <header class="topbar">
                <div class="topbar-title">AI Customer Support Copilot</div>
                <div id="backend-status" class="status-badge">Checking...</div>
            </header>

            <section id="messages" class="messages"></section>

            <form id="chat-form" class="composer">
                <input id="chat-input" type="text" placeholder="Ask a question about your documents..."
                    autocomplete="off" />
                <button type="submit" class="send-btn">Send</button>
            </form>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
